{% extends 'mailing/base.html' %}

{% block title %}
	Resetting password
{% endblock %}

{% block main %}
	<p>
        Dear, {{ user.email }},
    </p>
    <p>
        To reset your password, please follow the link:
        <br>
        <a href="{{ password_reset_link }}">Reset</a>
        <br>
        And use this token to set new password:
        <code>{{ password_reset_token }}</code>
    </p>
{% endblock %}
